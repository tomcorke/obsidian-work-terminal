name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

      - run: pnpm run build

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
            pty-wrapper.py
